name: Experimental wheels (Intel macOS / ARM Linux)

# Build-only smoke test for the load-dynamic targets that have no pyke static
# ORT prebuilt. Validates the wheel both BUILDS and IMPORTS. Does NOT publish.
# Trigger manually from the Actions tab (workflow_dispatch).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos-x86_64:
    name: Intel macOS (x86_64) cross-build
    runs-on: macos-latest # arm64 runner (reliable); cross-compiles x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel (cross x86_64)
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-apple-darwin
          command: build
          args: --release --out dist
          sccache: "true"
      # Native import is skipped: this runner is arm64 and the wheel is x86_64.
      # The arm64-linux job's IMPORT OK already validates the load-dynamic
      # runtime contract; here we only verify the x86_64 wheel compiles+links.
      - name: Show built wheel
        run: ls -la dist/

  linux-aarch64:
    name: ARM Linux (aarch64) build + import
    runs-on: ubuntu-24.04-arm # native arm64 — no QEMU/cross (avoids ring asm miscompile)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-unknown-linux-gnu
          command: build
          args: --release --out dist
          manylinux: auto
      - name: Import smoke test
        run: |
          python -m pip install --upgrade pip
          pip install dist/*.whl
          # cd out of the repo so `import headroom` resolves the installed wheel,
          # not the local ./headroom source tree (which has no compiled _core).
          cd "$RUNNER_TEMP"
          python -c "import headroom, headroom._core; from headroom import compress; print('IMPORT OK', getattr(headroom, '__version__', '?'))"
