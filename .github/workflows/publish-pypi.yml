name: Publish to PyPI

# Builds the Rust-backed wheels (manylinux, macOS, Windows) plus an sdist and
# publishes them to PyPI when a v* tag is pushed.
#
# Setup required once:
#   - Create a PyPI API token at https://pypi.org/manage/account/token/
#     scoped to the `headroom-hardened` project (or account-wide for the first
#     upload, then re-scope).
#   - Add it as a repo secret named PYPI_API_TOKEN
#     (Settings -> Secrets and variables -> Actions -> New repository secret).
#
# Release:
#   git tag v0.26.1 && git push origin v0.26.1

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build wheels (${{ matrix.platform }} ${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # abi3 wheels (cp310-abi3) — one wheel per target covers Python 3.10+.
        # ORT binary strategy is per-target (see crates/headroom-core/Cargo.toml):
        # macOS arm64 + Linux x86_64 static-link pyke's prebuilt ORT; Windows,
        # Intel macOS, and ARM Linux use ort-load-dynamic (ORT loaded lazily at
        # runtime, only for the optional relevance/ML tiers).
        # ARM Linux builds on a native arm64 runner — the QEMU/cross toolchain
        # miscompiles ring's ARM asm. Intel macOS cross-compiles on the arm64
        # runner (macos-13 Intel runners schedule unreliably).
        include:
          - { platform: linux,   runner: ubuntu-latest,    target: x86_64 }
          - { platform: linux,   runner: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { platform: macos,   runner: macos-latest,     target: aarch64-apple-darwin }
          - { platform: macos,   runner: macos-latest,     target: x86_64-apple-darwin }
          - { platform: windows, runner: windows-latest,   target: x64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          command: build
          args: --release --out dist
          sccache: "true"
          manylinux: auto

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform }}-${{ matrix.target }}
          path: dist/*.whl

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build, sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
